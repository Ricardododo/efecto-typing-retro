<svg xmlns="http://www.w3.org/2000/svg" width="420" height="44" viewBox="0 0 420 44">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </linearGradient>
    <style>
      text { font-family: 'Courier New', monospace; font-size: 14px; }
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .char { opacity: 0; animation: appear 0.01s forwards; }
      @keyframes appear { to { opacity: 1; } }
    </style>
  </defs>
  <rect width="420" height="44" rx="8" fill="url(#bg)" stroke="rgba(200,190,37,0.3)" stroke-width="1"/>
  <text x="12" y="28" fill="#7e8a9e">Finalizando DAM,</text>
  <text x="148" y="28" fill="#c8be25">
    <tspan class="char" style="animation-delay: 0s;">b</tspan>
    <tspan class="char" style="animation-delay: 0.07s;">u</tspan>
    <tspan class="char" style="animation-delay: 0.14s;">s</tspan>
    <tspan class="char" style="animation-delay: 0.21s;">c</tspan>
    <tspan class="char" style="animation-delay: 0.28s;">a</tspan>
    <tspan class="char" style="animation-delay: 0.35s;">n</tspan>
    <tspan class="char" style="animation-delay: 0.42s;">d</tspan>
    <tspan class="char" style="animation-delay: 0.49s;">o</tspan>
    <tspan class="char" style="animation-delay: 0.56s;"> </tspan>
    <tspan class="char" style="animation-delay: 0.63s;">p</tspan>
    <tspan class="char" style="animation-delay: 0.7s;">r</tspan>
    <tspan class="char" style="animation-delay: 0.77s;">á</tspan>
