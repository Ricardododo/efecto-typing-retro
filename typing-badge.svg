<svg xmlns="http://www.w3.org/2000/svg" width="400" height="44" viewBox="0 0 400 44">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </linearGradient>
    <style>
      .t { font-family: 'Courier New', monospace; font-size: 14px; }
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .phrase1 { opacity: 0; animation: fade1 14s linear infinite; }
      .phrase2 { opacity: 0; animation: fade2 14s linear infinite; }
      .phrase3 { opacity: 0; animation: fade3 14s linear infinite; }
      .phrase4 { opacity: 0; animation: fade4 14s linear infinite; }
      .phrase5 { opacity: 0; animation: fade5 14s linear infinite; }
      .phrase6 { opacity: 0; animation: fade6 14s linear infinite; }
      .phrase7 { opacity: 0; animation: fade7 14s linear infinite; }
      @keyframes fade1 { 0%, 1.5% { opacity: 1; } 14%, 100% { opacity: 0; } }
      @keyframes fade2 { 0%, 14% { opacity: 0; } 15.5%, 28% { opacity: 1; } 29%, 100% { opacity: 0; } }
      @keyframes fade3 { 0%, 28% { opacity: 0; } 29.5%, 42% { opacity: 1; } 43%, 100% { opacity: 0; } }
      @keyframes fade4 { 0%, 42% { opacity: 0; } 43.5%, 56% { opacity: 1; } 57%, 100% { opacity: 0; } }
      @keyframes fade5 { 0%, 56% { opacity: 0; } 57.5%, 70% { opacity: 1; } 71%, 100% { opacity: 0; } }
      @keyframes fade6 { 0%, 70% { opacity: 0; } 71.5%, 84% { opacity: 1; } 85%, 100% { opacity: 0; } }
      @keyframes fade7 { 0%, 84% { opacity: 0; } 85.5%, 98% { opacity: 1; } 99%, 100% { opacity: 0; } }
    </style>
  </defs>
  <rect width="400" height="44" rx="8" fill="url(#bg)" stroke="rgba(200,190,37,0.3)" stroke-width="1"/>
  <text x="12" y="28" class="t" fill="#7e8a9e">Finalizando DAM,</text>
  <text x="148" y="28" class="t" fill="#c8be25">
    <tspan class="phrase1">buscando prácticas</tspan>
    <tspan class="phrase2">Java, SQL, Android</tspan>
    <tspan class="phrase3">Mejorando en WEB</tspan>
    <tspan class="phrase4">Python en progreso</tspan>
    <tspan class="phrase5">Quiero crecer</tspan>
    <tspan class="phrase6">Adaptable y aprender</tspan>
    <tspan class="phrase7">Disponible prácticas</tspan>
    <tspan class="cursor">|</tspan>
  </text>
</svg>