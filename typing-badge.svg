<svg xmlns="http://www.w3.org/2000/svg" width="380" height="44" viewBox="0 0 380 44">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </linearGradient>
  </defs>
  <rect width="380" height="44" rx="8" fill="url(#bg)" stroke="rgba(200,190,37,0.3)" stroke-width="1"/>
  <style>
    @keyframes blink { 50% { opacity: 0; } }
    .c { animation: blink 1s step-end infinite; }
  </style>
  <text x="12" y="28" font-family="'Courier New', monospace" font-size="14">
    <tspan fill="#7e8a9e">Finalizando DAM,</tspan>
    <tspan fill="#c8be25" class="c">buscando prácticas</tspan>
  </text>
</svg>